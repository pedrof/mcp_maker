apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: forge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forge
    spec:
      serviceAccountName: forge
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: migrate
          image: forge-backend:latest   # patched by overlay
          command: ["alembic", "-c", "/app/alembic.ini", "upgrade", "head"]
          workingDir: /app
          env:
            - name: PYTHONPATH
              value: /app
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: forge-secrets
                  key: DATABASE_URL
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 256Mi }
      containers:
        - name: backend
          image: forge-backend:latest   # patched by overlay
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          env:
            - name: PYTHONPATH
              value: /app
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: forge-secrets
                  key: DATABASE_URL
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: forge-secrets
                  key: ANTHROPIC_API_KEY
                  optional: true
          livenessProbe:
            httpGet: { path: /livez, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet: { path: /livez, port: 8080 }
            failureThreshold: 30
            periodSeconds: 2
