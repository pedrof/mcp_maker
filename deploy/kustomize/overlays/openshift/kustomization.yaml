apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: forge


resources:
- route.yaml
- ../../base

images:
- name: forge-backend
  newName: image-registry.openshift-image-registry.svc:5000/forge/forge-backend
  newTag: latest

  # OpenShift restricted-v2: drop seccompProfile (managed by SCC policy)
patches:
- patch: |
    - op: remove
      path: /spec/template/spec/securityContext/seccompProfile
  target:
    kind: Deployment
    name: forge
