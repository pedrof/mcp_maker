{{- if and .Values.ingress.enabled (eq .Values.platform "k3s") }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "forge.fullname" . }}
  labels: {{ include "forge.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{ toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts: [{{ .Values.ingress.host }}]
      secretName: {{ .Values.ingress.tlsSecretName }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "forge.fullname" . }}
                port: { number: {{ .Values.service.port }} }
{{- end }}
