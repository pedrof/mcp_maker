apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "forge.fullname" . }}
  labels: {{ include "forge.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels: {{ include "forge.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{ include "forge.selectorLabels" . | nindent 8 }}
    spec:
      securityContext: {{ toYaml .Values.podSecurityContext | nindent 8 }}
      serviceAccountName: {{ include "forge.fullname" . }}

      {{- if .Values.migrations.enabled }}
      initContainers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["alembic", "-c", "/app/alembic.ini", "upgrade", "head"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "forge.secretName" . }}
                  key: DATABASE_URL
            - name: PYTHONPATH
              value: /app
          workingDir: /app
          securityContext: {{ toYaml .Values.containerSecurityContext | nindent 12 }}
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 256Mi }
      {{- end }}

      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          {{- with .Values.image.digest }}
          image: "{{ $.Values.image.repository }}@{{ . }}"
          {{- end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
              protocol: TCP
          securityContext: {{ toYaml .Values.containerSecurityContext | nindent 12 }}
          resources: {{ toYaml .Values.resources | nindent 12 }}

          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "forge.secretName" . }}
                  key: DATABASE_URL
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "forge.secretName" . }}
                  key: ANTHROPIC_API_KEY
                  optional: true
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "forge.secretName" . }}
                  key: OIDC_CLIENT_SECRET
                  optional: true
            - name: DEBUG
              value: {{ .Values.config.debug | quote }}
            - name: ANTHROPIC_MODEL
              value: {{ .Values.config.anthropicModel | quote }}
            - name: ANTHROPIC_BASE_URL
              value: {{ .Values.config.anthropicBaseUrl | quote }}
            - name: CORS_ORIGINS
              value: {{ .Values.config.corsOrigins | quote }}
            - name: OIDC_ISSUER
              value: {{ .Values.config.oidcIssuer | quote }}
            - name: OIDC_CLIENT_ID
              value: {{ .Values.config.oidcClientId | quote }}

          livenessProbe:
            httpGet: { path: /livez, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          startupProbe:
            httpGet: { path: /livez, port: 8080 }
            failureThreshold: 30
            periodSeconds: 2
