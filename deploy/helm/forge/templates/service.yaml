apiVersion: v1
kind: Service
metadata:
  name: {{ include "forge.fullname" . }}
  labels: {{ include "forge.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector: {{ include "forge.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8080
      protocol: TCP
