{{- if not .Values.existingSecret }}
{{- if or .Values.secrets.databaseUrl .Values.secrets.anthropicApiKey .Values.secrets.oidcClientSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "forge.fullname" . }}-secrets
  labels: {{ include "forge.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  {{- if .Values.secrets.databaseUrl }}
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  {{- end }}
  {{- if .Values.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.oidcClientSecret }}
  OIDC_CLIENT_SECRET: {{ .Values.secrets.oidcClientSecret | quote }}
  {{- end }}
{{- end }}
{{- end }}
# Production: use kubeseal to create a SealedSecret instead of setting values here.
# See deploy/docs/secrets.md for the kubeseal workflow.
